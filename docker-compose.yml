services:
  postgres:
    image: postgres:16
    container_name: uzum-postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-uzum}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-uzum}
      POSTGRES_DB: ${POSTGRES_DB:-uzum}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-uzum}"]
      interval: 5s
      timeout: 3s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: uzum-ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama-models:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama-pull:
    image: ollama/ollama:latest
    container_name: uzum-ollama-pull
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["ollama", "pull", "${OLLAMA_MODEL:-qwen2.5:3b}"]
    environment:
      - OLLAMA_HOST=http://ollama:11434
    restart: "no"

  backend:
    build: ./backend
    container_name: uzum-backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5:3b}
      - OLLAMA_HOST=http://ollama:11434
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-uzum}:${POSTGRES_PASSWORD:-uzum}@postgres:5432/${POSTGRES_DB:-uzum}
      - ADMIN_TOKEN=${ADMIN_TOKEN:-uzum-admin-secret}
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build: ./frontend
    container_name: uzum-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  admin:
    build: ./admin
    container_name: uzum-admin
    ports:
      - "${ADMIN_PORT:-3001}:3001"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres-data:
  ollama-models:
